{% extends 'base/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card p-3 shadow-sm border-0">
            <h5 class="mb-3">Register New Patient</h5>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-2">
                    <input type="text" name="name" class="form-control" placeholder="Patient Name" required>
                </div>
                <div class="mb-2">
                    <input type="text" name="phone" class="form-control" placeholder="Phone Number" required>
                </div>
                <div class="mb-3">
                    <textarea name="address" class="form-control" placeholder="Residential Address" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-success w-100">Add Patient</button>
            </form>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white">
                <h5 class="mb-0">Patient Directory</h5>
            </div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Address</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in patients %}
                        <tr>
                            <td>{{ p.id }}</td>
                            <td>{{ p.name }}</td>
                            <td>{{ p.phone }}</td>
                            <td>{{ p.address }}</td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="4" class="text-center text-muted">No patients found in the record.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
